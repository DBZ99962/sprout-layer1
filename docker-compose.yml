version: '3.9'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: sprout
      POSTGRES_PASSWORD: sprout_pass
      POSTGRES_DB: sprout_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sprout']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    restart: always
    env_file: ./apps/api/.env
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
